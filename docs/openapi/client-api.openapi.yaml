              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/ValidationFailed400"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired402"
        "403":
          $ref: "#/components/responses/Forbidden403"
        "404":
