          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlainErrorBody"
              example:
                error: Upload token failed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired402"
        "403":
          $ref: "#/components/responses/Forbidden403"
        "409":
          $ref: "#/components/responses/Conflict409"
        "413":
          $ref: "#/components/responses/PayloadTooLarge413"
        "429":
          $ref: "#/components/responses/RateLimited429"
        "500":
          $ref: "#/components/responses/Internal500"
        "503":
          $ref: "#/components/responses/ServiceUnavailable503"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/BlobUploadHandshakeRequest"
                - $ref: "#/components/schemas/BlobUploadCompletedRequest"
            examples:
              handleUploadToken:
                summary: First leg — server authorizes client-side Blob upload
                description: Exact shape is owned by `@vercel/blob` / `handleUpload`.
                value:
                  pathname: user-uploads/example.jpg
                  clientPayload: {}
              uploadCompleted:
                summary: Second leg — `blob.upload-completed`
                value:
                  type: blob.upload-completed
                  blob:
                    url: https://….public.blob.vercel-storage.com/…
                    pathname: user-uploads/….jpg
