  /api/v1/upload:
    post:
      operationId: post_api_v1_upload
      summary: Multipart upload — field `file` (memory → Blob or R2)
      description: |-
        **`multipart/form-data`** with field **`file`**. Runs **`validateGenerationUploadFull`** (`generationUploadGuards`) — MIME/size/video duration errors return **`400`**/`413` with **`code` + `solution`**.

        Empty upload → **`{ success:false, error:"No file uploaded" }`** (**`400`**).

        Multer over limit → **`FILE_TOO_LARGE`** (**`413`**) via global error middleware with **`maxUploadBytes`**.

        When neither Blob nor R2 is configured → **`503`**.
      tags:
        - API
      responses:
        "200":
          description: Stored object URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponseExample"
        "400":
          $ref: "#/components/responses/UploadRejected400"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired402"
        "403":
          $ref: "#/components/responses/Forbidden403"
        "409":
          $ref: "#/components/responses/Conflict409"
        "413":
          $ref: "#/components/responses/PayloadTooLarge413"
        "429":
          $ref: "#/components/responses/RateLimited429"
        "500":
          $ref: "#/components/responses/Internal500"
        "503":
          $ref: "#/components/responses/ServiceUnavailable503"
      security:
        - SessionCookieAuth: []
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image/video buffer validated by guards
  /api/v1/upload/blob:
    post:
      operationId: post_api_v1_upload_blob
      summary: Vercel Blob — token (`handleUpload`) or upload completion
      description: |-
        **Dual JSON contract on one route**

        1. **`body.type ≠ blob.upload-completed`**: **`authMiddleware`** runs; `@vercel/blob` **`handleUpload`** returns `{ url, pathname, … }` token JSON for client **direct Blob** upload (**no multipart**).

        2. **`{"type":"blob.upload-completed", ...}`**: completion callback from **`handleUpload`** (**no Bearer** required).

        **`400`**: malformed token/handshake (**`handleUpload`** error).

