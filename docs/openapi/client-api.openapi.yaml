  /api/upload/blob:
    post:
      operationId: post_api_upload_blob
      summary: Vercel Blob — token (`handleUpload`) or upload completion
      description: |-
        **Dual JSON contract on one route**

        1. **`body.type ≠ blob.upload-completed`**: **`authMiddleware`** runs; `@vercel/blob` **`handleUpload`** returns `{ url, pathname, … }` token JSON for client **direct Blob** upload (**no multipart**).

        2. **`{"type":"blob.upload-completed", ...}`**: completion callback from **`handleUpload`** (**no Bearer** required).

        **`400`**: malformed token/handshake (**`handleUpload`** error).

        Prefer Blob for large payloads — avoids server **`413`** multer/memory limits documented on **`POST /api/upload`**.
      tags:
        - API
      responses:
        "200":
          $ref: "#/components/responses/SuccessOk"
        "400":
