components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: Self-serve integration keys (**`mcl_`…**).
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: mcl_<secret>
      description: Same credential as **`X-Api-Key`** in Authorization header form.
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: refreshToken
      description: "JWT session cookie from login/signup (**HttpOnly**, browser). SPA must send **`credentials: 'include'`**."
  schemas:
    AnyJsonPayload:
      type: object
      additionalProperties: true
      description: Arbitrary JSON (route-specific contract).
    SuccessFlag:
      type: object
      properties:
        success:
          type: boolean
          example: true
      additionalProperties: true
    PlainErrorBody:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
        message:
          type: string
      additionalProperties: true
    ValidationErrorBody:
      type: object
      required:
        - success
        - message
        - errors
      properties:
        success:
          type: boolean
          enum:
            - false
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
    UploadGuardError:
      type: object
      required:
        - success
        - code
        - message
        - solution
      properties:
        success:
          type: boolean
          enum:
            - false
        code:
          type: string
          enum:
            - NO_FILE
            - INVALID_FILE_TYPE
            - INVALID_IMAGE_TYPE
            - INVALID_VIDEO_TYPE
            - INVALID_LORA_TRAINING_FILE_TYPE
            - FILE_TOO_LARGE
            - LORA_TRAINING_FILE_TOO_LARGE
            - VIDEO_TOO_SHORT
            - VIDEO_TOO_LONG
        message:
          type: string
        solution:
          type: string
        status:
          type: integer
    CreditsShortage402:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
        creditsNeeded:
          type: number
        creditsAvailable:
          type: number
    MulterTooLarge413:
      type: object
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          example: FILE_TOO_LARGE
        message:
          type: string
        maxUploadBytes:
          type: integer
        maxUploadLabel:
          type: string
        solution:
          type: string
    StripeCheckoutRequestExample:
      type: object
      required:
        - tierId
        - billingCycle
      properties:
        tierId:
          type: string
          description: Internal tier slug / id advertised by **`GET /pricing`** clients.
          example: pro
        billingCycle:
          type: string
          enum:
            - monthly
            - annual
        referralCode:
          type: string
          nullable: true
          description: Optional referral slug for discounted checkout validation.
        discountCode:
          type: string
          nullable: true
    BlobUploadHandshakeRequest:
      type: object
      description: First leg of **`@vercel/blob/client`** **`handleUpload`** contract.
      additionalProperties: true
    BlobUploadCompletedRequest:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - blob.upload-completed
          description: Webhook-shaped completion payload from **`handleUpload`**.
      additionalProperties: true
    PresignRequestExample:
      type: object
      required:
        - contentType
      properties:
        contentType:
          type: string
          example: image/jpeg
        folder:
          type: string
          enum:
            - uploads
            - training
            - support-attachments
            - generations
    UploadUrlResponseExample:
      type: object
      properties:
        success:
          type: boolean
          example: true
        url:
          type: string
          format: uri
    PresignUrlsResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        uploadUrl:
          type: string
          format: uri
          description: Time-limited PUT target (R2).
        publicUrl:
          type: string
          format: uri
          description: Stable read URL after upload completes.
    AuthLoginExample:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 6
    AuthSignupExample:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string
      description: Mirrors **`validateSignup`** — see **`src/middleware/validation.js`**.
    UpscaleRequestJson:
      type: object
      required:
        - inputImageUrl
      properties:
        inputImageUrl:
          type: string
          format: uri
          description: Preferred — image already uploaded to Blob/CDN reachable by backend.
    HealthQueueExample:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        queue:
          type: object
  responses:
    SuccessOk:
      description: Ok — inspect route-specific **`application/json`** body.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessFlag"
    Unauthorized:
      description: Missing/invalid session or **`mcl_`** key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PlainErrorBody"
          examples:
            apiKeyMissing:
              value:
                success: false
                error: Unauthorized
    ValidationFailed400:
      description: express-validator (**`validation.js`**) aggregation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorBody"
    UploadRejected400:
      description: File guard (`generationUploadGuards`) — actionable **`solution`**.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UploadGuardError"
    PayloadTooLarge413:
      description: Storage / multer size cap — follow **`solution`** field.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MulterTooLarge413"
    PaymentRequired402:
      description: Credits shortfall vs route price.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreditsShortage402"
    Forbidden403:
      description: Forbidden (role, impersonation mismatch, Stripe permission, …).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PlainErrorBody"
    Conflict409:
      description: State conflict — e.g. presign disabled (**Blob-only**) or duplicate resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PlainErrorBody"
    RateLimited429:
      description: IP / burst / concurrency limit (**`GENERATION_QUEUE_FULL`** on generation queue middleware).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PlainErrorBody"
    Internal500:
      description: Unhandled error — sanitized user message when present.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PlainErrorBody"
    ServiceUnavailable503:
      description: Dependencies missing (**R2/Blob**/provider) or degraded mode.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PlainErrorBody"
