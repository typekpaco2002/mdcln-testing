        "409":
          $ref: "#/components/responses/Conflict409"
        "413":
          $ref: "#/components/responses/PayloadTooLarge413"
        "429":
          $ref: "#/components/responses/RateLimited429"
        "500":
          $ref: "#/components/responses/Internal500"
        "503":
          $ref: "#/components/responses/ServiceUnavailable503"
      security:
        - SessionCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeCheckoutRequestExample"
            example:
              tierId: pro
              billingCycle: monthly
              referralCode: friend-slug
